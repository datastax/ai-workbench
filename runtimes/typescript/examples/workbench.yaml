# Default dev config. Boots cleanly with no env vars and persists
# workspaces / catalogs / vector stores / documents / jobs to a
# JSON tree under `./.workbench-data/` (gitignored), so restarting
# `npm run dev` doesn't wipe your work.
#
# Other backends — see docs/examples/workbench.yaml for the
# annotated full reference, or the matrix below:
#
# - `memory` (no persistence; lost on restart) — change `driver`
#   below to `memory` and remove `root`. Useful for tests, CI,
#   and `docker run` demos that don't need durability.
#
# - `astra` (Astra Data API Tables, multi-writer-safe, production)
#   — change `driver` to `astra` and supply `endpoint`, `tokenRef`,
#   `keyspace`. See docs/configuration.md.

version: 1

runtime:
  port: 8080
  logLevel: info

controlPlane:
  driver: file
  root: .workbench-data

# Optional — loaded into the memory backend at startup. Ignored by
# `file` and `astra` backends. Only useful when you flip `driver`
# back to `memory`.
#
# seedWorkspaces:
#   - name: demo
#     kind: mock

# Optional — wires up the chat-with-Bobbie surface. Set
# HUGGINGFACE_API_KEY in your .env (https://huggingface.co/settings/tokens)
# and uncomment the block below. Without `chat`, POST .../messages
# returns 503 chat_disabled (the rest of the runtime works fine).
#
# chat:
#   tokenRef: env:HUGGINGFACE_API_KEY
#   model: Qwen/Qwen2.5-7B-Instruct
#   maxOutputTokens: 1024
#   retrievalK: 6
#   # Override Bobbie's persona (null = built-in default):
#   # systemPrompt: null
