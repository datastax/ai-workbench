version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      root-node-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/runtimes/typescript"
    schedule:
      interval: "weekly"
    groups:
      typescript-runtime-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
    groups:
      web-deps:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
    groups:
      docs-site-deps:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/runtimes/python"
    schedule:
      interval: "weekly"
    groups:
      python-runtime-deps:
        patterns: ["*"]

  - package-ecosystem: "gradle"
    directory: "/runtimes/java"
    schedule:
      interval: "weekly"
    groups:
      java-runtime-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
