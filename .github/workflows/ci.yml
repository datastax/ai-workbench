name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-workbench:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=ci
            APP_COMMIT=${{ github.sha }}

      - name: Smoke test image
        run: |
          docker run --rm -d --name wb -p 8080:8080 ai-workbench:ci
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8080/healthz >/dev/null; then
              echo "healthz ok"
              break
            fi
            sleep 1
          done
          curl -fsS http://localhost:8080/healthz
          curl -fsS http://localhost:8080/readyz
          curl -fsS http://localhost:8080/v1/workspaces
          curl -fsS http://localhost:8080/v1/openapi.json | head -c 200
          echo
          curl -fsS -o /dev/null -w 'docs HTTP %{http_code}\n' http://localhost:8080/docs
          docker stop wb
