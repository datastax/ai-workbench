name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '11 10 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
