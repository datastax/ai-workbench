name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '11 10 * * 1'

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Repository secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm run security:secrets
