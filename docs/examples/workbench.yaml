# Annotated sample workbench.yaml for AI Workbench (TypeScript runtime).
#
# The runtime is a single "green box" — one HTTP server exposing
# /api/v1/*. Workspaces, knowledge bases, services, API keys, agents,
# and conversations are runtime data (mutable via the API), not
# config. The only thing config decides is WHERE that runtime data is
# persisted: memory / file / astra.

version: 1

runtime:
  # environment: development   # development | production
  port: 8080
  logLevel: info
  # requestIdHeader: X-Request-Id
  # uiDir: null            # absolute path to the UI dist/. null
  #                        # auto-detects /app/public (Docker image),
  #                        # ${cwd}/public, or ${cwd}/apps/web/dist.
  #                        # UI_DIR env also overrides.
  # publicOrigin: https://workbench.example.com
  # trustProxyHeaders: false

# ---------- Control plane ----------
#
# Pick ONE of the three driver stanzas below.

# 1) `memory` — default; workspaces live in process memory.
#    Great for CI, tests, and `docker run` demos. Optional seeds below
#    populate the in-memory store at startup.
controlPlane:
  driver: memory

# 2) `file` — JSON on disk. Single-node self-hosted.
# controlPlane:
#   driver: file
#   root: /var/lib/workbench

# 3) `astra` — Astra Data API Tables. Production-grade.
#    `tokenRef` resolves through the secrets providers below.
# controlPlane:
#   driver: astra
#   endpoint: https://<db-id>-<region>.apps.astra.datastax.com
#   tokenRef: env:ASTRA_DB_APPLICATION_TOKEN
#   keyspace: workbench
#   # jobPollIntervalMs: 500   # cross-replica subscriber poll cadence
#   # jobsResume:              # opt in for clustered deployments only
#   #   enabled: true
#   #   graceMs: 60000
#   #   intervalMs: 60000

# ---------- Seed workspaces (memory driver only) ----------
#
# Optional. Only used when `controlPlane.driver == memory`. Populates
# the in-memory store at startup so developers can skip POST requests.
# The runtime validates the schema — `name` + `kind` are required,
# everything else is optional.

# seedWorkspaces:
#   - name: demo
#     kind: mock
#   - name: prod-astra
#     kind: astra
#     credentialsRef:
#       token: env:ASTRA_DB_APPLICATION_TOKEN
#     keyspace: workbench

# ---------- Auth ----------
#
# Default is mode: disabled + anonymousPolicy: allow, which matches
# pre-auth behavior (everything is anonymous, routes don't enforce).
# Uncomment ONE of the stanzas below to turn enforcement on.

# auth:
#   mode: disabled            # disabled | apiKey | oidc | any
#   anonymousPolicy: allow    # allow | reject

# Workspace-scoped API keys (Phase 2). Issue + revoke via the
# /api/v1/workspaces/{w}/api-keys endpoints or the web UI.
# auth:
#   mode: apiKey
#   anonymousPolicy: reject
#   # Optional break-glass token for first-workspace/API-key setup.
#   # Resolve from a 32+ character secret and rotate/remove after use.
#   # bootstrapTokenRef: env:WB_BOOTSTRAP_TOKEN

# OIDC bearer tokens (Phase 3). The runtime verifies JWT signatures
# against the issuer's JWKS at request time. Set mode: any if you
# want apiKey AND oidc accepted at the same time.
# auth:
#   mode: oidc
#   anonymousPolicy: reject
#   # bootstrapTokenRef: env:WB_BOOTSTRAP_TOKEN
#   oidc:
#     issuer: https://login.example.com/realms/workbench
#     audience: ai-workbench
#     # jwksUri: https://login.example.com/realms/workbench/protocol/openid-connect/certs
#     # clockToleranceSeconds: 30
#     # claims:
#     #   subject: sub
#     #   label: email
#     #   workspaceScopes: wb_workspace_scopes
#     # Optional — enables the browser login flow so the web UI
#     # stops requiring paste-a-token. When `client` is present the
#     # runtime mounts /auth/{login,callback,me,logout}.
#     # client:
#     #   clientId: ai-workbench-ui
#     #   # clientSecretRef: env:OIDC_CLIENT_SECRET  # public clients omit
#     #   # redirectPath: /auth/callback
#     #   # postLogoutPath: /
#     #   # scopes: [openid, profile, email]
#     #   # sessionCookieName: wb_session
#     #   sessionSecretRef: env:WB_SESSION_SECRET    # 32+ bytes
