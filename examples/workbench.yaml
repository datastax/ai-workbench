# Minimal default config. Boots cleanly with no env vars.
#
# The default `controlPlane.driver` is `memory` — workspaces live only
# in process memory. To switch backends, see docs/examples/workbench.yaml.

version: 1

runtime:
  port: 8080
  logLevel: info

controlPlane:
  driver: memory

# Optional — loaded into the memory backend at startup. Ignored by
# `file` and `astra` backends.
#
# seedWorkspaces:
#   - name: demo
#     kind: mock
