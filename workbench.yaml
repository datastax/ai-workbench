# Default config used for `npm run dev` in-repo.
# Production images should mount their own workbench.yaml.

version: 1

runtime:
  port: 8080
  logLevel: info

workspaces:
  - id: mock
    description: "In-memory mock workspace"
    driver: mock
    vectorStores:
      - id: demo-vectors
        collection: demo_vectors
        dimensions: 1536
    catalogs:
      - id: demo-docs
        vectorStore: demo-vectors
